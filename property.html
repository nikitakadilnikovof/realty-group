<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antalya Realty Group</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-page="detail" data-lang="tr">
  <div class="overlay" id="overlay"></div>

  <header class="header">
    <div class="top-bar">
      <div class="top-container">
        <div class="top-left">
          <button class="dropdown-trigger" id="languageBtn" type="button">
            <span data-i18n="languageName">Türkçe</span>
            <span class="arrow"></span>
          </button>
          <button class="dropdown-trigger" id="currencyBtn" type="button">
            <span data-currency-label>USD</span>
            <span class="arrow"></span>
          </button>
        </div>
        <div class="top-right">
          <span class="call-text" data-i18n="callNow">HEMEN ARAYIN</span>
          <a href="tel:+905556826955">+90 555 682 69 55</a>
        </div>
      </div>
    </div>
    <div class="navbar">
      <div class="nav-container">
        <a href="./index.html" class="logo-placeholder" aria-label="Antalya Realty Group">
          <img src="./assets/logo-realty-transparent.png" alt="Antalya Realty Group">
        </a>
        <nav class="nav-menu">
          <a href="./index.html#catalog" data-i18n="buy">SATIN AL</a>
          <a href="./index.html#catalog" data-i18n="sell">SAT</a>
          <a href="./index.html#catalog" data-i18n="rent">KIRALA</a>
          <a href="#contact" data-i18n="contacts">ILETISIM</a>
        </nav>
        <button class="appointment-btn" id="openAppointment" type="button" data-i18n="appointment">RANDEVU AL</button>
      </div>
    </div>
  </header>

  <div class="mega-panel" id="megaPanel">
    <button class="close-btn" id="closeBtn" type="button" aria-label="Close"></button>
    <div class="panel-inner">
      <div class="panel-column">
        <h3 class="panel-title" data-i18n="siteLanguage">SITE DILI</h3>
        <div class="panel-links language-links" id="languageLinks"></div>
      </div>
      <div class="panel-column">
        <h3 class="panel-title" data-i18n="currency">PARA BIRIMI</h3>
        <div class="panel-links currency-links" id="currencyLinks"></div>
      </div>
      <div class="panel-column">
        <h3 class="panel-title" data-i18n="measurement">OLCU BIRIMI</h3>
        <div class="panel-links">
          <a href="#" class="active-item">METRIC</a>
          <a href="#">IMPERIAL</a>
        </div>
      </div>
    </div>
  </div>

  <main class="property-detail-page" id="propertyDetail"></main>

  <div class="appointment-overlay" id="appointmentOverlay">
    <div class="appointment-modal">
      <button class="appointment-close" id="appointmentClose" type="button" aria-label="Close"></button>
      <h2 class="appointment-title" data-i18n="appointmentTitle">Randevu olustur</h2>
      <form class="appointment-form">
        <div class="appointment-left">
          <input type="date" id="appointmentDate">
          <input type="text" data-i18n-placeholder="firstName" placeholder="Ad">
          <input type="text" data-i18n-placeholder="lastName" placeholder="Soyad">
          <input type="tel" data-i18n-placeholder="phone" placeholder="Telefon">
        </div>
        <div class="appointment-right">
          <textarea data-i18n-placeholder="message" placeholder="Mesaj"></textarea>
          <button type="submit" data-i18n="send">GONDER</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
